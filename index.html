<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <!--
    viewport-fit=cover → fills iPhone notch / Dynamic Island area.
    We handle safe areas manually with env(safe-area-inset-*).
  -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1E3A5F" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>סודוקו אונליין</title>

  <style>
  /* ═══════════════════════════════════════════
     DESIGN TOKENS
  ═══════════════════════════════════════════ */
  :root {
    /* iOS system palette */
    --bg:           #F2F2F7;   /* iOS systemBackground */
    --bg2:          #FFFFFF;   /* iOS secondarySystemBackground */
    --bg3:          #F2F2F7;   /* iOS tertiarySystemBackground */
    --lbl:          #000000;
    --lbl2:         rgba(60,60,67,.60);
    --lbl3:         rgba(60,60,67,.30);
    --sep:          rgba(60,60,67,.29);
    --sep-solid:    #C6C6C8;
    --fill:         rgba(120,120,128,.16);
    --fill2:        rgba(120,120,128,.12);

    /* iOS accent colors */
    --blue:         #007AFF;
    --red:          #FF3B30;
    --green:        #34C759;

    /* Game semantics */
    --given:        #1C1C1E;
    --user:         #007AFF;
    --conflict:     #FF3B30;
    --cell-sel:     rgba(0,122,255,.15);
    --cell-peer:    rgba(0,122,255,.05);
    --cell-same:    rgba(0,122,255,.18);
    --cell-err:     rgba(255,59,48,.10);

    --grid-thin:    rgba(60,60,67,.18);
    --grid-bold:    rgba(60,60,67,.55);
    --grid-outer:   #374151;

    --brand:        #1E3A5F;

    /* Border radius */
    --r-xs: 6px;
    --r-sm: 9px;
    --r-md: 13px;
    --r-lg: 17px;
    --r-xl: 22px;

    /* Transitions */
    --ease:     0.18s ease;
    --spring:   0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  /* ═══════════════════════════════════════════
     RESET
  ═══════════════════════════════════════════ */
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }

  html {
    height: 100%;
    -webkit-text-size-adjust: 100%;
    text-size-adjust: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text',
                 'Helvetica Neue', Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    background: var(--bg);
    color: var(--lbl);

    /* ── MOBILE: fill screen, zero scroll ── */
    height: 100vh;          /* fallback */
    height: 100dvh;         /* dynamic — accounts for browser chrome */
    overflow: hidden;
    display: flex;
    flex-direction: column;

    /* Safe areas (notch, Dynamic Island, home indicator) */
    padding-top:    env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
    padding-left:   env(safe-area-inset-left);
    padding-right:  env(safe-area-inset-right);
  }

  button {
    cursor: pointer;
    font-family: inherit;
    border: none;
    background: none;
    touch-action: manipulation;   /* kills 300ms tap delay */
    -webkit-user-select: none;
    user-select: none;
  }

  a { text-decoration: none; color: inherit; touch-action: manipulation; }

  /* ═══════════════════════════════════════════
     HEADER
  ═══════════════════════════════════════════ */
  .site-header {
    height: 56px;
    background: #FFFFFF;
    display: flex;
    align-items: center;
    padding: 0 16px;
    gap: 10px;
    flex-shrink: 0;
    border-bottom: 1.5px solid #E5E7EB;
    box-shadow: 0 1px 6px rgba(0,0,0,.06);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  /* ── Logo image slot ──
     Drop your logo: set src="your-logo.png" on #logo-img.
     The dashed outline disappears automatically when src is set. */
  .logo-slot {
    width: 36px;
    height: 36px;
    border-radius: 10px;
    border: 1.5px dashed #CBD5E1;
    background: #F1F5F9;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    transition: border-color var(--ease), background var(--ease);
  }
  .logo-slot:hover {
    border-color: var(--brand);
    background: #EFF6FF;
  }

  .logo-img {
    width: 100%; height: 100%;
    object-fit: contain;
    display: none;
  }
  .logo-img[src]:not([src=""]) { display: block; }

  .logo-ph {
    opacity: .5;
    display: flex;
    pointer-events: none;
    color: #94A3B8;
  }
  .logo-img[src]:not([src=""]) ~ .logo-ph { display: none; }

  .logo-word {
    font-size: 20px;
    font-weight: 800;
    color: var(--brand);
    letter-spacing: -.4px;
  }

  /* Thin vertical divider between logo and nav */
  .header-divider {
    width: 1px;
    height: 20px;
    background: #E2E8F0;
    margin-inline-start: auto;
    flex-shrink: 0;
  }

  .header-nav {
    display: flex;
    align-items: center;
    gap: 2px;
  }
  .header-nav a {
    font-size: 12.5px;
    font-weight: 500;
    color: #64748B;
    transition: all var(--ease);
    white-space: nowrap;
    padding: 5px 9px;
    border-radius: 7px;
  }
  .header-nav a:hover {
    color: var(--brand);
    background: #F1F5F9;
  }
  .nav-hide-sm { }

  /* ═══════════════════════════════════════════
     DIFFICULTY — iOS Segmented Control (mobile)
                  Underline tabs (desktop)
  ═══════════════════════════════════════════ */
  .diff-bar {
    padding: 8px 14px 6px;
    background: var(--bg);
    flex-shrink: 0;
  }

  .seg {
    display: flex;
    background: rgba(120,120,128,.13);
    border-radius: var(--r-sm);
    padding: 2px;
    gap: 2px;
  }

  .seg-btn {
    flex: 1;
    padding: 7px 2px;
    text-align: center;
    font-size: 12.5px;
    font-weight: 500;
    color: rgba(60,60,67,.75);
    border-radius: 7px;
    transition: all .18s ease;
    white-space: nowrap;
  }
  .seg-btn.active {
    background: var(--bg2);
    color: var(--lbl);
    font-weight: 600;
    box-shadow: 0 1px 4px rgba(0,0,0,.15), 0 .5px 1px rgba(0,0,0,.10);
  }

  /* ═══════════════════════════════════════════
     GAME AREA — vertical flex, fills all remaining height
  ═══════════════════════════════════════════ */
  .game-area {
    flex: 1;
    min-height: 0;          /* ← critical: allows flex child to shrink past content */
    display: flex;
    flex-direction: column;
    padding: 5px 11px 6px;
    gap: 5px;
  }

  /* ═══════════════════════════════════════════
     PUZZLE PANEL — top section, grows to fill space
  ═══════════════════════════════════════════ */
  .puzzle-panel {
    flex: 1;
    min-height: 0;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  /* ── INFO BAR ── */
  .game-info {
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 34px;
    flex-shrink: 0;
    padding: 0 1px;
  }

  .info-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .diff-lbl {
    font-size: 11.5px;
    font-weight: 700;
    color: var(--lbl2);
    text-transform: uppercase;
    letter-spacing: .6px;
  }

  .mistakes-row {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .mistakes-txt {
    font-size: 11.5px;
    color: var(--lbl2);
  }

  .pips {
    display: flex;
    gap: 4px;
  }

  .pip {
    width: 8px; height: 8px;
    border-radius: 50%;
    border: 1.5px solid var(--sep-solid);
    background: transparent;
    transition: all .22s;
  }
  .pip.on { background: var(--red); border-color: var(--red); }

  .timer {
    font-family: ui-monospace, 'SF Mono', 'Courier New', monospace;
    font-size: 16px;
    font-weight: 600;
    color: var(--lbl);
    font-variant-numeric: tabular-nums;
    letter-spacing: .5px;
  }

  .btn-new {
    background: var(--blue);
    color: #fff;
    font-size: 12px;
    font-weight: 600;
    padding: 5px 13px;
    border-radius: 20px;
    letter-spacing: .1px;
    transition: all var(--ease);
  }
  .btn-new:active { transform: scale(.94); opacity: .85; }

  /* ── BOARD CONTAINER — stretches to fill remaining puzzle-panel space ── */
  .board-wrap {
    flex: 1;
    min-height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    /* container-type: size enables cqw/cqh units on children */
    container-type: size;
  }

  /* ── THE 9×9 GRID ──
     min(100cqw, 100cqh) → picks the smaller of container W or H → always square.
     This is the correct fix for cells appearing as rectangles on tall/narrow viewports. */
  .sudoku-grid {
    width: min(100cqw, 100cqh);
    height: auto;
    aspect-ratio: 1 / 1;
    display: grid;
    grid-template-rows: repeat(9, 1fr);
    border: 2px solid var(--grid-outer);
    border-radius: 3px;
    overflow: hidden;
    background: var(--bg2);
    /* GPU hint for smooth selection repaints */
    will-change: contents;
  }

  .grid-row {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
  }

  .cell {
    display: flex;
    align-items: center;
    justify-content: center;
    border-inline-end: 1px solid var(--grid-thin);
    border-bottom: 1px solid var(--grid-thin);
    cursor: pointer;
    position: relative;
    transition: background-color .06s;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }

  .cell-num {
    font-size: clamp(11px, 3.1vw, 22px);
    font-weight: 500;
    line-height: 1;
    pointer-events: none;
  }

  /* Remove outer borders (container has its own border) */
  .cell:last-child       { border-inline-end: none; }
  .grid-row:last-child .cell { border-bottom: none; }

  /* Thick box separators (after col 3, col 6 / row 3, row 6) */
  .cell.box-col          { border-inline-end: 2px solid var(--grid-bold); }
  .grid-row.box-row .cell { border-bottom:   2px solid var(--grid-bold); }

  /* Cell content types */
  .cell.given .cell-num  { color: var(--given); font-weight: 700; }
  .cell.user  .cell-num  { color: var(--user);  font-weight: 500; }
  .cell.wrong .cell-num  { color: var(--conflict); }

  /* Highlight layers (stacked — later class wins unless !important) */
  .cell.hl-peer          { background: var(--cell-peer); }
  .cell.hl-same          { background: var(--cell-same); }
  .cell.hl-err           { background: var(--cell-err); }
  .cell.hl-sel           { background: var(--cell-sel) !important; }

  /* Pencil marks */
  .notes-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%; height: 100%;
    padding: 1px;
    pointer-events: none;
  }
  .note-n {
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: clamp(4px, .95vw, 7px);
    font-weight: 500;
    color: var(--lbl2);
    line-height: 1;
  }

  /* ═══════════════════════════════════════════
     INPUT PANEL — fixed-height, below puzzle on mobile
  ═══════════════════════════════════════════ */
  .input-panel {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* ── CONTROLS (4 buttons, single row on mobile) ── */
  .controls {
    display: flex;
    gap: 5px;
  }

  .ctrl {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 3px;
    height: 46px;
    border-radius: var(--r-md);
    font-size: 10px;
    font-weight: 600;
    color: var(--lbl2);
    background: var(--bg2);
    border: 1px solid var(--sep);
    transition: all var(--ease);
    letter-spacing: .1px;
  }
  .ctrl:active { transform: scale(.93); background: var(--fill); }
  .ctrl.active {
    background: rgba(0,122,255,.10);
    border-color: rgba(0,122,255,.30);
    color: var(--blue);
  }
  .ctrl svg {
    width: 18px; height: 18px;
    stroke-width: 1.8;
  }

  /* ── NUMPAD — single row on mobile (1×9) ── */
  .numpad {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 4px;
  }

  .num-btn {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 48px;
    font-size: 19px;
    font-weight: 700;
    color: var(--lbl);
    background: var(--bg2);
    border-radius: var(--r-sm);
    border: 1px solid var(--sep);
    transition: transform .12s, background .12s, color .12s;
  }
  .num-btn:active {
    transform: scale(.88);
    background: rgba(0,122,255,.13);
    color: var(--blue);
  }
  .num-btn.done {
    opacity: .16;
    pointer-events: none;
  }

  /* ═══════════════════════════════════════════
     COMPLETION MODAL — iOS bottom sheet on mobile
  ═══════════════════════════════════════════ */
  .modal-scrim {
    position: fixed; inset: 0;
    background: rgba(0,0,0,.38);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    z-index: 400;
    opacity: 0;
    pointer-events: none;
    transition: opacity .22s;
    padding-bottom: env(safe-area-inset-bottom);
  }
  .modal-scrim.open {
    opacity: 1;
    pointer-events: all;
  }

  .modal {
    background: var(--bg2);
    border-radius: 22px 22px 0 0;
    width: 100%;
    max-width: 480px;
    padding: 0 22px 28px;
    text-align: center;
    transform: translateY(100%);
    transition: transform var(--spring);
  }
  .modal-scrim.open .modal { transform: none; }

  .modal-handle {
    width: 38px; height: 5px;
    background: var(--sep-solid);
    border-radius: 3px;
    margin: 12px auto 18px;
  }

  .modal-icon  { font-size: 46px; line-height: 1; margin-bottom: 8px; }
  .modal-title { font-size: 24px; font-weight: 800; margin-bottom: 4px; }
  .modal-sub   { font-size: 14px; color: var(--lbl2); margin-bottom: 18px; }

  .modal-stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    background: var(--bg);
    border-radius: var(--r-lg);
    padding: 14px 16px;
    margin-bottom: 18px;
  }
  .stat-val {
    font-size: 26px; font-weight: 800;
    color: var(--blue);
    font-variant-numeric: tabular-nums;
    line-height: 1;
  }
  .stat-lbl { font-size: 11px; color: var(--lbl3); margin-top: 3px; font-weight: 500; }

  .modal-actions { display: flex; gap: 10px; }
  .m-btn {
    flex: 1; padding: 14px;
    border-radius: var(--r-md);
    font-size: 15px; font-weight: 600;
    transition: all var(--ease);
    touch-action: manipulation;
  }
  .m-btn-primary  { background: var(--blue); color: #fff; }
  .m-btn-primary:active  { opacity: .82; transform: scale(.97); }
  .m-btn-secondary { background: var(--fill); color: var(--blue); }
  .m-btn-secondary:active { opacity: .70; }

  /* ═══════════════════════════════════════════
     FOOTER — visible on desktop only
  ═══════════════════════════════════════════ */
  .site-footer {
    display: none;
    background: var(--bg2);
    border-top: 1px solid var(--sep);
    flex-shrink: 0;
  }
  .footer-inner {
    max-width: 900px;
    margin: 0 auto;
    padding: 18px 32px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 24px;
  }
  .footer-brand {
    font-size: 15px;
    font-weight: 800;
    color: var(--brand);
    letter-spacing: -.3px;
    flex-shrink: 0;
  }
  .footer-links {
    display: flex; flex-wrap: wrap;
    justify-content: center;
    gap: 2px 4px;
  }
  .footer-links a {
    font-size: 12.5px;
    color: var(--lbl2);
    transition: color var(--ease);
    padding: 4px 8px;
    border-radius: 5px;
  }
  .footer-links a:hover { color: var(--lbl); background: var(--fill); }
  .footer-copy { font-size: 11.5px; color: var(--lbl3); flex-shrink: 0; }


  /* ═══════════════════════════════════════════
     SMALL PHONE ADJUSTMENTS (≤ 375px)
  ═══════════════════════════════════════════ */
  @media (max-width: 375px) {
    .nav-hide-sm   { display: none; }
    .logo-word     { font-size: 18px; }
    .ctrl          { height: 40px; font-size: 9px; }
    .ctrl svg      { width: 15px; height: 15px; }
    .num-btn       { height: 42px; font-size: 17px; }
    .seg-btn       { font-size: 11.5px; padding: 6px 1px; }
    .numpad        { gap: 3px; }
    .controls      { gap: 4px; }
  }

  /* Extra small (SE 1st gen, 320px) */
  @media (max-width: 330px) {
    .num-btn { height: 38px; font-size: 15px; }
    .ctrl    { height: 35px; font-size: 8.5px; }
  }


  /* ═══════════════════════════════════════════
     DESKTOP LAYOUT (≥ 900px)
     Re-enable scroll, switch to side-by-side
  ═══════════════════════════════════════════ */
  @media (min-width: 900px) {

    body {
      height: auto;
      min-height: 100vh;
      overflow: auto;          /* scroll is fine on desktop */
    }

    /* Desktop header — taller, more refined */
    .site-header {
      height: 64px;
      padding: 0 32px;
      box-shadow: 0 1px 8px rgba(0,0,0,.07);
    }
    .logo-slot { width: 40px; height: 40px; border-radius: 11px; }
    .logo-word { font-size: 22px; }
    .header-nav a { font-size: 13px; padding: 6px 11px; }

    /* Desktop difficulty — white underline-tab style */
    .diff-bar {
      background: var(--bg2);
      border-bottom: 1px solid var(--sep);
      padding: 0 32px;
      box-shadow: 0 1px 4px rgba(0,0,0,.04);
    }
    .seg {
      display: flex;
      background: transparent;
      border-radius: 0;
      padding: 0; gap: 0;
      max-width: 560px;
      margin: 0 auto;
    }
    .seg-btn {
      padding: 14px 6px 12px;
      font-size: 13.5px;
      font-weight: 500;
      border-radius: 0;
      background: transparent !important;
      box-shadow: none !important;
      color: var(--lbl2);
      border-bottom: 2.5px solid transparent;
      transition: color var(--ease), border-color var(--ease);
    }
    .seg-btn:hover { color: var(--lbl); }
    .seg-btn.active {
      color: var(--blue);
      border-bottom-color: var(--blue);
      font-weight: 600;
    }

    /* Game area → horizontal flex (RTL: first child = rightmost) */
    .game-area {
      flex-direction: row;
      justify-content: center;
      align-items: flex-start;
      padding: 20px;
      gap: 16px;
      flex: none;               /* no longer fills viewport */
      min-height: 0;
    }

    /* Ad sidebars */
    .ad-sidebar {
      width: 160px;
      min-height: 500px;
      flex-shrink: 0;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px;
      gap: 14px;
      background: var(--bg2);
      border-radius: var(--r-xl);
      border: 1px solid var(--sep);
      box-shadow: 0 1px 3px rgba(0,0,0,.06);
    }
    .ad-lbl {
      font-size: 9.5px;
      font-weight: 600;
      color: var(--lbl3);
      letter-spacing: 1px;
      text-transform: uppercase;
    }
    .ad-slot {
      width: 140px; height: 300px;
      background: var(--bg);
      border-radius: var(--r-md);
      border: 1px dashed var(--sep-solid);
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--lbl3);
      font-size: 11px;
    }
    /* Right ad: visible at 1100px+ */
    .ad-right { }
    @media (min-width: 1100px) { .ad-right { display: flex; } }
    /* Left ad: visible at 1320px+ */
    @media (min-width: 1320px) { .ad-left  { display: flex; } }

    /* Puzzle panel — bigger on desktop */
    .puzzle-panel {
      flex: none;
      width: 100%;
      max-width: 540px;
      background: var(--bg2);
      border-radius: var(--r-xl);
      padding: 18px 18px 22px;
      border: 1px solid var(--sep);
      box-shadow: 0 2px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      gap: 12px;
    }

    .game-info {
      height: auto;
      padding: 0 2px 0;
      flex-shrink: 0;
    }
    /* Slightly larger info text on desktop */
    .diff-lbl   { font-size: 12px; }
    .timer      { font-size: 18px; }
    .btn-new    { font-size: 13px; padding: 7px 16px; }

    /* Board fills panel width on desktop */
    .board-wrap {
      flex: none;
      width: 100%;
      /* fixed height so the square grid knows both dimensions */
      aspect-ratio: 1;
    }

    .sudoku-grid {
      width: min(100cqw, 100cqh);
      height: auto;
      aspect-ratio: 1;
    }

    /* Input panel — wider to match bigger board proportions */
    .input-panel {
      flex-shrink: 0;
      width: 290px;
      background: var(--bg2);
      border-radius: var(--r-xl);
      padding: 16px;
      border: 1px solid var(--sep);
      box-shadow: 0 2px 12px rgba(0,0,0,.07), 0 1px 3px rgba(0,0,0,.05);
      gap: 10px;
      /* align controls top with grid top (skip info bar height) */
      margin-top: 62px;
    }

    /* Controls: 2×2 grid on desktop */
    .controls {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
    }
    .ctrl {
      height: 62px;
      font-size: 11.5px;
      letter-spacing: .15px;
      border: 1px solid var(--sep);
      background: var(--bg3);
    }
    .ctrl svg { width: 20px; height: 20px; }
    .ctrl:active { transform: scale(.96); background: var(--fill); }

    .input-divider {
      height: 1px;
      background: var(--sep);
      margin: 0;
    }

    /* Desktop numpad: switch back to 3×3 with big buttons */
    .numpad {
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;

    .num-btn {
      height: 82px;

      border-color: rgba(0,122,255,.22);

    .num-btn:active { transform: scale(.93) translateY(0); box-shadow: none; }

    /* Modal: centered on desktop, not bottom-sheet */
    .modal-scrim { align-items: center; padding-bottom: 0; }
    .modal {
      border-radius: var(--r-xl);
      max-width: 360px;

      transition: transform .28s cubic-bezier(0.34, 1.3, 0.64, 1);

    .site-footer { display: block; }

    /* Cell numbers larger on big grid */
    .cell-num { font-size: clamp(14px, 2.6vw, 26px); }
  }

  <!-- ════════════════════════════════════════════════════════
       GAME LOGIC
  ════════════════════════════════════════════════════════ -->
  <script>
  "use strict";

  /* ── Sample puzzle (replace with real engine in Next.js) ── */
  const PUZZLE = [
    [5,3,0, 0,7,0, 0,0,0],
    [6,0,0, 1,9,5, 0,0,0],
    [0,9,8, 0,0,0, 0,6,0],
    [8,0,0, 0,6,0, 0,0,3],
    [4,0,0, 8,0,3, 0,0,1],
    [7,0,0, 0,2,0, 0,0,6],
    [0,6,0, 0,0,0, 2,8,0],
    [0,0,0, 4,1,9, 0,0,5],
    [0,0,0, 0,8,0, 0,7,9],
  ];
  const SOLUTION = [
    [5,3,4, 6,7,8, 9,1,2],
    [6,7,2, 1,9,5, 3,4,8],
    [1,9,8, 3,4,2, 5,6,7],
    [8,5,9, 7,6,1, 4,2,3],
    [4,2,6, 8,5,3, 7,9,1],
    [7,1,3, 9,2,4, 8,5,6],
    [9,6,1, 5,3,7, 2,8,4],
    [2,8,7, 4,1,9, 6,3,5],
    [3,4,5, 2,8,6, 1,7,9],
  ];

  /* ── State ── */
  const G = {
    puzzle: null, solution: null,
    user: null,      /* 9×9: 0 = empty, 1-9 = placed, null = given */
    notes: null,     /* 9×9 Set<number> */
    sel: null,       /* {r,c} | null */
    notes_on: false,
    mistakes: 0,
    hints: 0,
    history: [],
    sec: 0,
    tick: null,
    done: false,
  };

  /* ── Helpers ── */
  const val = (r,c) =>
    G.puzzle[r][c] !== 0 ? G.puzzle[r][c] : (G.user[r][c] || 0);

  const sameBox = (r1,c1,r2,c2) =>
    (r1/3|0) === (r2/3|0) && (c1/3|0) === (c2/3|0);

  /* ── Init ── */
  function init(puzzle, solution) {
    clearInterval(G.tick);
    G.puzzle   = puzzle.map(r => [...r]);
    G.solution = solution.map(r => [...r]);
    G.user     = puzzle.map(r => r.map(v => v ? null : 0));
    G.notes    = Array.from({length:9}, () => Array.from({length:9}, () => new Set()));
    G.sel = null; G.notes_on = false;
    G.mistakes = 0; G.hints = 0;
    G.history = []; G.sec = 0; G.done = false;

    document.getElementById('btn-notes').classList.remove('active');
    tick(0); updatePips(); render(); updateDone();

    G.tick = setInterval(() => { if (!G.done) tick(++G.sec); }, 1000);
  }

  /* ── Render grid ── */
  function render() {
    const el = document.getElementById('grid');
    el.innerHTML = '';
    const sr = G.sel?.r ?? -1, sc = G.sel?.c ?? -1;
    const sv = sr >= 0 ? val(sr,sc) : 0;

    for (let r = 0; r < 9; r++) {
      const row = document.createElement('div');
      row.className = 'grid-row' + (r===2||r===5 ? ' box-row' : '');

      for (let c = 0; c < 9; c++) {
        const cell = document.createElement('div');
        const given = G.puzzle[r][c] !== 0;
        const uv    = G.user[r][c];
        const hn    = G.notes[r][c].size > 0;

        let cls = 'cell' + (c===2||c===5 ? ' box-col' : '');
        if (given) cls += ' given';
        else if (uv > 0) cls += ' user';

        /* conflict highlight */
        if (!given && uv > 0 && G.solution[r][c] !== uv) {
          cls += ' wrong hl-err';
        } else if (sr >= 0 && !(r===sr && c===sc)) {
          const peer = r===sr || c===sc || sameBox(r,c,sr,sc);
          if (peer) cls += ' hl-peer';
          if (sv > 0 && val(r,c) === sv) cls += ' hl-same';
        }
        if (r===sr && c===sc) cls += ' hl-sel';

        cell.className = cls;
        cell.addEventListener('pointerdown', () => select(r,c));

        const v = given ? G.puzzle[r][c] : uv;
        if (v > 0) {
          const s = document.createElement('span');
          s.className = 'cell-num';
          s.textContent = v;
          cell.appendChild(s);
        } else if (hn) {
          const ng = document.createElement('div');
          ng.className = 'notes-grid';
          for (let n = 1; n <= 9; n++) {
            const s = document.createElement('span');
            s.className = 'note-n';
            s.textContent = G.notes[r][c].has(n) ? n : '';
            ng.appendChild(s);
          }
          cell.appendChild(ng);
        }

        row.appendChild(cell);
      }
      el.appendChild(row);
    }
  }

  /* ── Select cell ── */
  function select(r,c) {
    G.sel = {r,c};
    render();
  }

  /* ── Place number ── */
  function place(n) {
    if (G.done || !G.sel) return;
    const {r,c} = G.sel;
    if (G.puzzle[r][c] !== 0) return;

    if (G.notes_on) {
      const ns = G.notes[r][c];
      push({type:'note', r,c, prev: new Set(ns)});
      ns.has(n) ? ns.delete(n) : ns.add(n);
    } else {
      push({type:'cell', r,c, pv: G.user[r][c], pn: new Set(G.notes[r][c])});
      G.user[r][c] = n;
      if (n > 0 && G.solution[r][c] !== n) {
        G.mistakes = Math.min(3, G.mistakes+1);
        updatePips();
      } else if (n > 0) {
        clearNotes(r,c,n);
        updateDone();
        checkWin();
      }
    }
    render();
  }

  function clearNotes(r,c,n) {
    for (let i=0;i<9;i++) { G.notes[r][i].delete(n); G.notes[i][c].delete(n); }
    const br=r/3|0, bc=c/3|0;
    for (let dr=0;dr<3;dr++) for (let dc=0;dc<3;dc++) G.notes[br*3+dr][bc*3+dc].delete(n);
  }

  /* ── Controls ── */
  function undo() {
    if (!G.history.length) return;
    const s = G.history.pop();
    if (s.type==='cell') { G.user[s.r][s.c]=s.pv; G.notes[s.r][s.c]=s.pn; }
    else G.notes[s.r][s.c] = s.prev;
    updateDone(); render();
  }

  function erase() {
    if (G.done||!G.sel) return;
    const {r,c} = G.sel;
    if (G.puzzle[r][c]!==0) return;
    push({type:'cell', r,c, pv:G.user[r][c], pn:new Set(G.notes[r][c])});
    G.user[r][c]=0; G.notes[r][c].clear(); render();
  }

  function toggleNotes() {
    G.notes_on = !G.notes_on;
    document.getElementById('btn-notes').classList.toggle('active', G.notes_on);
  }

  function hint() {
    if (G.done||!G.sel) return;
    const {r,c} = G.sel;
    if (G.puzzle[r][c]!==0 || G.user[r][c]===G.solution[r][c]) return;
    push({type:'cell', r,c, pv:G.user[r][c], pn:new Set(G.notes[r][c])});
    G.user[r][c] = G.solution[r][c];
    G.notes[r][c].clear(); G.hints++;
    clearNotes(r,c,G.solution[r][c]);
    updateDone(); render(); checkWin();
  }

  /* ── History ── */
  function push(s) { G.history.push(s); if (G.history.length>200) G.history.shift(); }

  /* ── Numpad dim ── */
  function updateDone() {
    const cnt = new Array(10).fill(0);
    for (let r=0;r<9;r++) for (let c=0;c<9;c++) {
      const v = val(r,c);
      if (v>0 && G.solution[r][c]===v) cnt[v]++;
    }
    document.querySelectorAll('.num-btn').forEach(b => {
      b.classList.toggle('done', cnt[+b.dataset.n] >= 9);
    });
  }

  /* ── Pips ── */
  function updatePips() {
    document.querySelectorAll('.pip').forEach((p,i) => p.classList.toggle('on', i<G.mistakes));
  }

  /* ── Timer ── */
  function tick(s) {
    const m = String(s/60|0).padStart(2,'0'), sec = String(s%60).padStart(2,'0');
    document.getElementById('timer').textContent = `${m}:${sec}`;
  }
  function fmt(s) { return String(s/60|0).padStart(2,'0')+':'+String(s%60).padStart(2,'0'); }

  /* ── Win check ── */
  function checkWin() {
    for (let r=0;r<9;r++) for (let c=0;c<9;c++)
      if (val(r,c) !== G.solution[r][c]) return;
    G.done = true;
    clearInterval(G.tick);
    document.getElementById('m-time').textContent     = fmt(G.sec);
    document.getElementById('m-mistakes').textContent = G.mistakes;
    document.getElementById('m-hints').textContent    = G.hints;
    setTimeout(() => document.getElementById('modal').classList.add('open'), 450);
  }

  /* ── Keyboard ── */
  document.addEventListener('keydown', e => {
    if (!G.sel || G.done) return;
    const n = parseInt(e.key, 10);
    if (n >= 1 && n <= 9) { place(n); return; }
    if (e.key==='Backspace'||e.key==='Delete'||e.key==='0') { erase(); return; }
    const {r,c} = G.sel;
    const D = {ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};
    if (D[e.key]) {
      e.preventDefault();
      const [dr,dc] = D[e.key];
      select(Math.max(0,Math.min(8,r+dr)), Math.max(0,Math.min(8,c+dc)));
    }
  });

  /* ── Wire buttons ── */
  document.getElementById('btn-new').addEventListener('click', newGame);
  document.getElementById('btn-undo').addEventListener('click', undo);
  document.getElementById('btn-erase').addEventListener('click', erase);
  document.getElementById('btn-notes').addEventListener('click', toggleNotes);
  document.getElementById('btn-hint').addEventListener('click', hint);
  document.querySelectorAll('.num-btn').forEach(b =>
    b.addEventListener('pointerdown', () => place(+b.dataset.n))
  );
  document.querySelectorAll('.seg-btn').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.seg-btn').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('diff-lbl').textContent = b.textContent;
    newGame(); /* In Next.js: generate puzzle for b.dataset.diff */
  }));
  document.getElementById('m-new').addEventListener('click', () => {
    document.getElementById('modal').classList.remove('open');
    newGame();
  });
  document.getElementById('m-share').addEventListener('click', () => {
    const diff = document.querySelector('.seg-btn.active').textContent;
    const txt  = `פתרתי סודוקו ${diff} ב-${fmt(G.sec)} עם ${G.mistakes} טעויות 🧩\n${location.href}`;
    navigator.share?.({text:txt}).catch(()=>{}) ?? navigator.clipboard?.writeText(txt);
  });

  /* ── New game ── */
  function newGame() { init(PUZZLE, SOLUTION); }

  /* ── Start ── */
  newGame();
  </script>
